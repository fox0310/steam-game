<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>四人共享海域捕魚競技</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #071927;
      color: #e7f8ff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .wrap { width: min(1180px, 100vw); padding: 12px; }
    .wrap:fullscreen {
      width: 100vw;
      height: 100vh;
      padding: 12px;
      display: flex;
      flex-direction: column;
      background: #071927;
    }
    .bar, .links {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .links { display: none; font-size: 14px; }
    button {
      border: 1px solid #79b7c9;
      background: #0b2a3a;
      color: #e7f8ff;
      border-radius: 6px;
      padding: 8px 12px;
      cursor: pointer;
    }
    button.active { background: #2fb9d6; color: #03131c; }
    .hint { margin-left: auto; color: #b8dfea; font-size: 14px; }
    canvas {
      width: 100%;
      aspect-ratio: 16 / 9;
      display: block;
      border: 1px solid #24556a;
      background: #0b3147;
    }
    .wrap:fullscreen canvas { flex: 1; height: calc(100vh - 106px); aspect-ratio: auto; }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="bar" id="views"></div>
    <div class="links" id="host-links"></div>
    <canvas id="game" width="1280" height="720" aria-label="四人共享海域捕魚競技遊戲"></canvas>
  </main>
  <script src="game.js"></script>
</body>
</html>
