<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>共享礦場競技</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #111715;
      color: #f8e8b0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .wrap { width: min(1180px, 100vw); padding: 12px; }
    .wrap:fullscreen {
      width: 100vw;
      height: 100vh;
      padding: 12px;
      display: flex;
      flex-direction: column;
      background: #111715;
    }
    .bar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    button {
      border: 1px solid #8a7042;
      background: #251c13;
      color: #f8e8b0;
      border-radius: 6px;
      padding: 8px 12px;
      cursor: pointer;
    }
    button.active { background: #b7791f; color: #1b1209; }
    .hint { margin-left: auto; color: #d8c48d; font-size: 14px; }
    .links {
      display: none;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 10px;
      font-size: 14px;
    }
    .links button { padding: 6px 8px; }
    .links strong { align-self: center; color: #ffe3a0; }
    canvas {
      width: 100%;
      aspect-ratio: 16 / 9;
      display: block;
      border: 1px solid #4b3925;
      background: #1b211f;
    }
    .wrap:fullscreen canvas {
      flex: 1;
      height: calc(100vh - 64px);
      aspect-ratio: auto;
      object-fit: contain;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="bar" id="views"></div>
    <div class="links" id="host-links"></div>
    <canvas id="game" width="1280" height="720" aria-label="四人共享礦場競技遊戲"></canvas>
  </main>
  <script src="game.js"></script>
</body>
</html>
